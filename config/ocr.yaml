# ocr — baseline digits model
charset: "0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ "

image:
  width: 512
  height: 64
  font_dirs:
    - "data/fonts_simple"
    - "data/fonts_heavy"

dataset:
  data_json: "data/synthetic/labels.json"
  val_json: "data/synthetic/labels.json"
  num_samples: null
  batch_size: 256
  num_workers: 12
  prefetch_factor: 2
  # Synthetic generation params (used by generate_synthetic.py)
  synthetic:
    text_length: [3, 12]
    font_size: [32, 48]
    pad: [0, 3]
    jitter: [0, 10]

training:
  lr: 0.001
  epochs: 20
  grad_clip_norm: 5.0
  early_stop_patience: 50

loss:
  focal_alpha: 1.0
  focal_gamma: 1.0
  blank_idx: 0

checkpoint:
  latest_path: "latest_ocr.pth"
  best_path: "artifacts/ocr.pth"